spring.application.name=collab

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.sql=DEBUG

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.ap-southeast-2.amazonaws.com/ap-southeast-2_BCgTuKJeO
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://cognito-idp.ap-southeast-2.amazonaws.com/ap-southeast-2_BCgTuKJeO/.well-known/jwks.json

spring.security.oauth2.client.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.github.client-secret=${GITHUB_CLIENT_SECRET}

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

springdoc.api-docs.path=/api-docs

encryption.token.password=${ENCRYPTION_PASSWORD}
encryption.token.salt=${ENCRYPTION_SALT}

github.app.installation.id=107480020
github.app.id=2555091

aws.asset-bucket=${AWS_ASSET_BUCKET}
aws.cognito.user-pool.id=${COGNITO_USER_POOL_ID}
aws.api-gateway.invoke-url=${API_GATEWAY_INVOKE_URL}